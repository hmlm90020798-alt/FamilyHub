<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FamilyHub Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4f46e5">
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .item-card { transition: all 0.2s ease; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-20">
    <header class="bg-indigo-700 text-white p-6 shadow-xl sticky top-0 z-50">
        <div class="max-w-md mx-auto">
            <h1 class="text-2xl font-black tracking-tight uppercase">FamilyHub <span class="font-thin">Master</span></h1>
            <p id="filterStatus" class="text-[10px] opacity-70 mt-1 font-bold">A mostrar: Todas as Lojas</p>
        </div>
    </header>

    <main class="max-w-md mx-auto p-4 space-y-4">
        <!-- Input Section -->
        <section class="bg-white rounded-[2rem] shadow-sm p-6 border border-slate-200">
            <input id="itemNome" type="text" placeholder="O que comprar?" class="w-full p-4 bg-slate-50 rounded-2xl mb-3 outline-none focus:ring-2 focus:ring-indigo-500 text-lg border-none font-medium">
            
            <div class="grid grid-cols-2 gap-2 mb-3">
                <select id="itemLoja" class="p-3 bg-slate-100 rounded-xl text-xs font-bold text-slate-600 outline-none border-none">
                    <option value="Qualquer">🏪 Qualquer Loja</option>
                    <option value="Continente">Continente</option>
                    <option value="Pingo Doce">Pingo Doce</option>
                    <option value="Lidl">Lidl</option>
                    <option value="Mercadona">Mercadona</option>
                </select>
                <select id="itemSeccao" class="p-3 bg-slate-100 rounded-xl text-xs font-bold text-slate-600 outline-none border-none">
                    <option value="Geral">📦 Geral</option>
                    <option value="Talho">🥩 Talho</option>
                    <option value="Peixaria">🐟 Peixaria</option>
                    <option value="Frutas/Legumes">🥦 Frutas/Legumes</option>
                    <option value="Padaria">🥖 Padaria</option>
                    <option value="Laticínios">🥛 Laticínios</option>
                    <option value="Limpeza">🧼 Limpeza</option>
                    <option value="Congelados">❄️ Congelados</option>
                </select>
            </div>
            
            <button onclick="adicionar()" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-black shadow-lg shadow-indigo-100 active:scale-95 transition-all">
                ADICIONAR À LISTA
            </button>
        </section>

        <!-- Store Filters -->
        <div class="flex gap-2 overflow-x-auto py-2 no-scrollbar">
            <button onclick="filtrar('Todos')" class="bg-white px-5 py-2 rounded-full shadow-sm text-[10px] font-black border uppercase">Todas</button>
            <button onclick="filtrar('Continente')" class="bg-white px-5 py-2 rounded-full shadow-sm text-[10px] font-black border border-red-500 text-red-500 uppercase">Continente</button>
            <button onclick="filtrar('Mercadona')" class="bg-white px-5 py-2 rounded-full shadow-sm text-[10px] font-black border border-green-600 text-green-600 uppercase">Mercadona</button>
            <button onclick="filtrar('Lidl')" class="bg-white px-5 py-2 rounded-full shadow-sm text-[10px] font-black border border-blue-600 text-blue-600 uppercase">Lidl</button>
        </div>

        <!-- Grouped List -->
        <div id="listaItems" class="space-y-8"></div>
    </main>

    <script type="module">
        import { firebaseConfig } from './config.js';
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const colRef = collection(db, "familia_master_v1");

        window.adicionar = async () => {
            const nome = document.getElementById('itemNome');
            const loja = document.getElementById('itemLoja');
            const seccao = document.getElementById('itemSeccao');
            if (nome.value.trim()) {
                await addDoc(colRef, {
                    nome: nome.value,
                    loja: loja.value,
                    seccao: seccao.value,
                    feito: false,
                    t: Date.now()
                });
                nome.value = "";
            }
        };

        window.toggle = async (id, estado) => await updateDoc(doc(db, "familia_master_v1", id), { feito: !estado });
        window.remover = async (id) => await deleteDoc(doc(db, "familia_master_v1", id));

        let currentStore = 'Todos';
        window.filtrar = (loja) => {
            currentStore = loja;
            document.getElementById('filterStatus').innerText = `A mostrar: ${loja === 'Todos' ? 'Todas as Lojas' : loja}`;
            render();
        };

        function render() {
            onSnapshot(query(colRef, orderBy("t", "desc")), (snap) => {
                const list = document.getElementById('listaItems');
                list.innerHTML = "";
                
                // Agrupar por secção
                const grupos = {};
                snap.forEach(d => {
                    const item = d.data();
                    if (currentStore !== 'Todos' && item.loja !== currentStore) return;
                    
                    if (!grupos[item.seccao]) grupos[item.seccao] = [];
                    grupos[item.seccao].push({id: d.id, ...item});
                });

                for (const [seccao, itens] of Object.entries(grupos)) {
                    let seccaoHtml = `<div class="space-y-2">
                        <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest px-2">${seccao}</h3>`;
                    
                    itens.forEach(item => {
                        const cor = { 'Continente': 'bg-red-500', 'Mercadona': 'bg-green-600', 'Lidl': 'bg-blue-500' }[item.loja] || 'bg-indigo-400';
                        seccaoHtml += `
                            <div class="bg-white p-4 rounded-2xl shadow-sm flex justify-between items-center item-card ${item.feito ? 'opacity-40 grayscale' : ''}">
                                <div class="flex-1" onclick="toggle('${item.id}', ${item.feito})">
                                    <p class="text-md font-bold ${item.feito ? 'line-through text-slate-400' : 'text-slate-800'}">${item.nome}</p>
                                    <div class="flex items-center gap-2 mt-1">
                                        <span class="w-2 h-2 rounded-full ${cor}"></span>
                                        <span class="text-[9px] font-black uppercase text-slate-400">${item.loja}</span>
                                    </div>
                                </div>
                                <button onclick="remover('${item.id}')" class="text-slate-200 hover:text-red-500 text-lg ml-4">✕</button>
                            </div>`;
                    });
                    seccaoHtml += `</div>`;
                    list.innerHTML += seccaoHtml;
                }
            });
        }
        render();
    </script>
</body>
</html>
