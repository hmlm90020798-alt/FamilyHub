<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FamilyHub Custom</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4f46e5">
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-24">
    <header class="bg-indigo-700 text-white p-6 shadow-xl sticky top-0 z-50">
        <div class="max-w-md mx-auto">
            <h1 class="text-2xl font-black tracking-tight uppercase">FamilyHub <span class="font-thin text-indigo-200 text-sm">Custom</span></h1>
        </div>
    </header>

    <main class="max-w-md mx-auto p-4 space-y-4">
        
        <!-- Secção de Configuração (Escondida por defeito) -->
        <details class="bg-indigo-50 rounded-2xl p-4 border border-indigo-100 mb-2 shadow-inner">
            <summary class="text-xs font-black text-indigo-700 uppercase cursor-pointer">⚙️ Gerir Lojas e Secções</summary>
            <div class="mt-4 space-y-4">
                <div>
                    <label class="text-[10px] font-bold text-indigo-400 block mb-1">LOJAS (Separadas por vírgula)</label>
                    <textarea id="configLojas" class="w-full p-2 text-xs rounded-lg border-none focus:ring-1 focus:ring-indigo-400 outline-none h-16 shadow-sm"></textarea>
                </div>
                <div>
                    <label class="text-[10px] font-bold text-indigo-400 block mb-1">SECÇÕES (Separadas por vírgula)</label>
                    <textarea id="configSeccoes" class="w-full p-2 text-xs rounded-lg border-none focus:ring-1 focus:ring-indigo-400 outline-none h-16 shadow-sm"></textarea>
                </div>
                <button onclick="salvarConfig()" class="w-full bg-indigo-500 text-white py-2 rounded-lg text-xs font-bold uppercase tracking-widest shadow-md">Atualizar Menus</button>
            </div>
        </details>

        <!-- Filtro Visualização (Dropdown) -->
        <div class="bg-white p-3 rounded-2xl shadow-sm border border-slate-200 flex items-center gap-3">
            <span class="text-[10px] font-black text-slate-400 uppercase whitespace-nowrap">Ver na loja:</span>
            <select id="filtroVisualizacao" onchange="render()" class="flex-1 bg-slate-50 p-2 rounded-xl text-xs font-bold text-slate-700 outline-none border-none">
                <option value="Todos">Todas as Lojas</option>
            </select>
        </div>

        <!-- Input Section -->
        <section class="bg-white rounded-[2rem] shadow-sm p-6 border border-slate-200">
            <input id="itemNome" type="text" placeholder="O que comprar?" class="w-full p-4 bg-slate-50 rounded-2xl mb-3 outline-none focus:ring-2 focus:ring-indigo-500 text-lg border-none font-medium">
            <div class="grid grid-cols-2 gap-2 mb-3">
                <select id="itemLoja" class="p-3 bg-slate-100 rounded-xl text-xs font-bold text-slate-600 outline-none border-none"></select>
                <select id="itemSeccao" class="p-3 bg-slate-100 rounded-xl text-xs font-bold text-slate-600 outline-none border-none"></select>
            </div>
            <button onclick="adicionar()" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-black shadow-lg shadow-indigo-100 active:scale-95 transition-all uppercase">
                ADICIONAR
            </button>
        </section>

        <!-- List Content -->
        <div id="listaItems" class="space-y-6"></div>
    </main>

    <script type="module">
        import { firebaseConfig } from './config.js';
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const colRef = collection(db, "familia_custom_v1");

        // Configurações Padrão
        let lojas = ["Qualquer", "Continente", "Pingo Doce", "Lidl", "Mercadona"];
        let seccoes = ["Geral", "Talho", "Peixaria", "Frutas/Legumes", "Padaria", "Laticínios", "Limpeza", "Congelados"];

        // Carregar do LocalStorage
        const carregarConfig = () => {
            const l = localStorage.getItem('fh_lojas');
            const s = localStorage.getItem('fh_seccoes');
            if(l) lojas = JSON.parse(l);
            if(s) seccoes = JSON.parse(s);
            
            document.getElementById('configLojas').value = lojas.join(', ');
            document.getElementById('configSeccoes').value = seccoes.join(', ');
            atualizarDropdowns();
        };

        window.salvarConfig = () => {
            lojas = document.getElementById('configLojas').value.split(',').map(s => s.trim()).filter(s => s);
            seccoes = document.getElementById('configSeccoes').value.split(',').map(s => s.trim()).filter(s => s);
            localStorage.setItem('fh_lojas', JSON.stringify(lojas));
            localStorage.setItem('fh_seccoes', JSON.stringify(seccoes));
            atualizarDropdowns();
            render();
            alert('Configurações guardadas!');
        };

        const atualizarDropdowns = () => {
            const il = document.getElementById('itemLoja');
            const fv = document.getElementById('filtroVisualizacao');
            const is = document.getElementById('itemSeccao');
            
            const currentFv = fv.value;
            
            il.innerHTML = lojas.map(l => `<option value="${l}">${l}</option>`).join('');
            fv.innerHTML = `<option value="Todos">Todas as Lojas</option>` + lojas.map(l => `<option value="${l}">${l}</option>`).join('');
            is.innerHTML = seccoes.map(s => `<option value="${s}">${s}</option>`).join('');
            
            fv.value = currentFv || "Todos";
        };

        window.adicionar = async () => {
            const nome = document.getElementById('itemNome');
            const loja = document.getElementById('itemLoja');
            const seccao = document.getElementById('itemSeccao');
            if (nome.value.trim()) {
                await addDoc(colRef, {
                    nome: nome.value,
                    loja: loja.value,
                    seccao: seccao.value,
                    feito: false,
                    t: Date.now()
                });
                nome.value = ""; // Limpa a linha de entrada
            }
        };

        window.toggle = async (id, estado) => await updateDoc(doc(db, "familia_custom_v1", id), { feito: !estado });
        window.remover = async (id) => { if(confirm('Apagar?')) await deleteDoc(doc(db, "familia_custom_v1", id)); };

        window.render = () => {
            const filtro = document.getElementById('filtroVisualizacao').value;
            onSnapshot(query(colRef, orderBy("t", "desc")), (snap) => {
                const list = document.getElementById('listaItems');
                list.innerHTML = "";
                const grupos = {};
                
                snap.forEach(d => {
                    const item = d.data();
                    // Lógica: Se filtro é X, mostra X + Qualquer Loja. Se filtro é Todos, mostra tudo.
                    if (filtro !== 'Todos' && item.loja !== filtro && item.loja !== 'Qualquer') return;
                    
                    if (!grupos[item.seccao]) grupos[item.seccao] = [];
                    grupos[item.seccao].push({id: d.id, ...item});
                });

                seccoes.forEach(secName => {
                    if(!grupos[secName]) return;
                    let html = `<div class="space-y-2">
                        <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest px-2">${secName}</h3>`;
                    
                    grupos[secName].forEach(item => {
                        html += `
                            <div class="bg-white p-4 rounded-2xl shadow-sm flex justify-between items-center ${item.feito ? 'opacity-40 grayscale' : ''}">
                                <div class="flex-1" onclick="toggle('${item.id}', ${item.feito})">
                                    <p class="text-md font-bold ${item.feito ? 'line-through text-slate-400' : 'text-slate-800'}">${item.nome}</p>
                                    <span class="text-[9px] font-black uppercase text-indigo-400">${item.loja}</span>
                                </div>
                                <button onclick="remover('${item.id}')" class="text-slate-200 hover:text-red-500 text-lg ml-4">✕</button>
                            </div>`;
                    });
                    list.innerHTML += html + `</div>`;
                });
            });
        };

        carregarConfig();
        render();
    </script>
</body>
</html>
