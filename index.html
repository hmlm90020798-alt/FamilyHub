<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FamilyHub Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .modal-overlay { background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-24 font-sans">

    <header class="bg-indigo-700 text-white p-5 shadow-xl sticky top-0 z-40 flex justify-between items-center">
        <h1 class="text-xl font-black tracking-tighter uppercase italic">FamilyHub</h1>
        <button onclick="toggleModal('configModal')" class="p-2 bg-indigo-600 rounded-full shadow-inner hover:bg-indigo-500 transition-colors">
            ⚙️
        </button>
    </header>

    <main class="max-w-md mx-auto p-4 space-y-4">
        
        <div class="bg-white p-3 rounded-2xl shadow-sm border border-slate-200 flex items-center gap-3">
            <span class="text-[10px] font-black text-slate-400 uppercase whitespace-nowrap">Ver na loja:</span>
            <select id="filtroVisualizacao" onchange="render()" class="flex-1 bg-transparent text-sm font-bold text-slate-700 outline-none cursor-pointer"></select>
        </div>

        <section class="bg-white rounded-[2rem] shadow-md p-6 border border-slate-100">
            <div class="flex gap-2 mb-3">
                <input id="itemNome" type="text" placeholder="Artigo..." class="flex-[3] p-4 bg-slate-50 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 text-lg border-none font-medium">
                <input id="itemQt" type="text" placeholder="Qt." class="flex-1 p-4 bg-slate-50 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 text-center text-sm border-none font-bold">
            </div>
            
            <div class="grid grid-cols-2 gap-2 mb-4">
                <select id="itemLoja" class="p-3 bg-slate-100 rounded-xl text-xs font-bold text-slate-600 outline-none border-none"></select>
                <select id="itemSeccao" class="p-3 bg-slate-100 rounded-xl text-xs font-bold text-slate-600 outline-none border-none"></select>
            </div>
            
            <button id="btnSalvar" onclick="adicionar()" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-black shadow-lg shadow-indigo-100 active:scale-95 transition-all uppercase">
                ADICIONAR
            </button>
        </section>

        <div id="listaItems" class="space-y-6"></div>
    </main>

    <div id="configModal" class="fixed inset-0 modal-overlay z-50 hidden flex items-center justify-center p-6">
        <div class="bg-white w-full max-w-sm rounded-[2.5rem] p-8 shadow-2xl">
            <h2 class="text-lg font-black text-slate-800 mb-4 uppercase">Configurações</h2>
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] font-bold text-slate-400 block mb-1 uppercase tracking-widest">Lojas (separadas por vírgula)</label>
                    <textarea id="configLojas" class="w-full p-3 bg-slate-50 rounded-xl border-none text-sm h-20 outline-none"></textarea>
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-400 block mb-1 uppercase tracking-widest">Secções (separadas por vírgula)</label>
                    <textarea id="configSeccoes" class="w-full p-3 bg-slate-50 rounded-xl border-none text-sm h-20 outline-none"></textarea>
                </div>
                <div class="flex gap-2 pt-2">
                    <button onclick="toggleModal('configModal')" class="flex-1 bg-slate-100 text-slate-500 py-3 rounded-xl font-bold text-xs uppercase">Fechar</button>
                    <button onclick="salvarConfig()" class="flex-1 bg-indigo-600 text-white py-3 rounded-xl font-bold text-xs uppercase shadow-lg shadow-indigo-100">Gravar</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { firebaseConfig } from './config.js';
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const colRef = collection(db, "familia_elite_v5");

        let lojas = ["Qualquer", "Continente", "Pingo Doce", "Lidl", "Mercadona"];
        let seccoes = ["Geral", "Talho", "Peixaria", "Frutas", "Padaria", "Limpeza"];
        let editId = null;

        window.toggleModal = (id) => document.getElementById(id).classList.toggle('hidden');

        const carregarConfig = () => {
            const l = localStorage.getItem('fh_lojas_v5');
            const s = localStorage.getItem('fh_seccoes_v5');
            if(l) lojas = JSON.parse(l);
            if(s) seccoes = JSON.parse(s);
            document.getElementById('configLojas').value = lojas.join(', ');
            document.getElementById('configSeccoes').value = seccoes.join(', ');
            atualizarDropdowns();
        };

        window.salvarConfig = () => {
            lojas = document.getElementById('configLojas').value.split(',').map(s => s.trim()).filter(s => s);
            seccoes = document.getElementById('configSeccoes').value.split(',').map(s => s.trim()).filter(s => s);
            localStorage.setItem('fh_lojas_v5', JSON.stringify(lojas));
            localStorage.setItem('fh_seccoes_v5', JSON.stringify(seccoes));
            atualizarDropdowns();
            toggleModal('configModal');
            render();
        };

        const atualizarDropdowns = () => {
            document.getElementById('itemLoja').innerHTML = lojas.map(v => `<option value="${v}">${v}</option>`).join('');
            document.getElementById('itemSeccao').innerHTML = seccoes.map(v => `<option value="${v}">${v}</option>`).join('');
            document.getElementById('filtroVisualizacao').innerHTML = `<option value="Todos">Todas as Lojas</option>` + lojas.map(v => `<option value="${v}">${v}</option>`).join('');
        };

        window.adicionar = async () => {
            const nome = document.getElementById('itemNome');
            const qt = document.getElementById('itemQt');
            const loja = document.getElementById('itemLoja');
            const seccao = document.getElementById('itemSeccao');

            if (!nome.value.trim()) return;

            const dados = { nome: nome.value, qt: qt.value, loja: loja.value, seccao: seccao.value, feito: false, t: Date.now() };

            if (editId) {
                await updateDoc(doc(db, "familia_elite_v5", editId), dados);
                editId = null;
                document.getElementById('btnSalvar').innerText = "ADICIONAR";
            } else {
                await addDoc(colRef, dados);
            }
            
            nome.value = ""; 
            qt.value = ""; // Limpeza automática garantida
            nome.focus();
        };

        window.prepararEdicao = (id, n, q, l, s) => {
            document.getElementById('itemNome').value = n;
            document.getElementById('itemQt').value = q;
            document.getElementById('itemLoja').value = l;
            document.getElementById('itemSeccao').value = s;
            editId = id;
            document.getElementById('btnSalvar').innerText = "ATUALIZAR";
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        window.toggle = async (id, est) => await updateDoc(doc(db, "familia_elite_v5", id), { feito: !est });
        window.remover = async (id) => { if(confirm('Apagar artigo?')) await deleteDoc(doc(db, "familia_elite_v5", id)); };

        window.render = () => {
            const filtro = document.getElementById('filtroVisualizacao').value;
            onSnapshot(query(colRef, orderBy("t", "desc")), (snap) => {
                const list = document.getElementById('listaItems');
                list.innerHTML = "";
                const grupos = {};
                
                snap.forEach(d => {
                    const i = d.data();
                    if (filtro !== 'Todos' && i.loja !== filtro && i.loja !== 'Qualquer') return;
                    if (!grupos[i.seccao]) grupos[i.seccao] = [];
                    grupos[i.seccao].push({id: d.id, ...i});
                });

                seccoes.forEach(sec => {
                    if(!grupos[sec]) return;
                    let h = `<div class="space-y-2"><h3 class="text-[9px] font-black text-slate-300 uppercase tracking-widest px-2">${sec}</h3>`;
                    grupos[sec].forEach(i => {
                        h += `<div class="bg-white p-4 rounded-3xl shadow-sm flex items-center justify-between ${i.feito ? 'opacity-40 grayscale' : ''}">
                            <div class="flex-1" onclick="toggle('${i.id}', ${i.feito})">
                                <p class="text-md font-bold ${i.feito ? 'line-through text-slate-400' : 'text-slate-800'}">${i.nome} <span class="text-indigo-500 font-medium ml-1 text-sm">${i.qt}</span></p>
                                <span class="text-[9px] font-black text-slate-400 uppercase">${i.loja}</span>
                            </div>
                            <div class="flex gap-4 text-slate-300">
                                <button onclick="prepararEdicao('${i.id}','${i.nome}','${i.qt}','${i.loja}','${i.seccao}')" class="hover:text-indigo-500 text-lg">✎</button>
                                <button onclick="remover('${i.id}')" class="hover:text-red-500 text-lg">✕</button>
                            </div>
                        </div>`;
                    });
                    list.innerHTML += h + `</div>`;
                });
            });
        };

        carregarConfig();
        render();
    </script>
</body>
</html>
