<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FamilyHub</title>
    <meta name="theme-color" content="#4f46e5">
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .list-enter { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-10">

    <header class="bg-indigo-600 text-white p-6 shadow-lg mb-6 sticky top-0 z-10">
        <h1 class="text-2xl font-bold text-center">FamilyHub 🏠</h1>
        <p class="text-xs text-center opacity-80 mt-1">Compras e Tarefas Partilhadas</p>
    </header>

    <div class="max-w-md mx-auto p-4 space-y-8">
        <!-- Secção de Compras -->
        <section class="bg-white rounded-2xl shadow-sm p-5 border border-slate-100">
            <h2 class="text-lg font-bold text-indigo-700 mb-4 flex items-center gap-2">
                🛒 Lista de Compras
            </h2>
            <div class="flex gap-2 mb-4">
                <input id="itemCompra" type="text" placeholder="Adicionar item..." class="flex-1 p-3 border rounded-xl bg-slate-50 focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
                <button onclick="adicionarItem('compras', 'itemCompra')" class="bg-indigo-600 text-white px-5 py-2 rounded-xl hover:bg-indigo-700 active:scale-95 transition-all font-bold text-xl">+</button>
            </div>
            <ul id="listaCompras" class="divide-y divide-slate-100"></ul>
        </section>

        <!-- Secção de Tarefas -->
        <section class="bg-white rounded-2xl shadow-sm p-5 border border-slate-100">
            <h2 class="text-lg font-bold text-emerald-700 mb-4 flex items-center gap-2">
                ✅ Tarefas e Compromissos
            </h2>
            <div class="flex gap-2 mb-4">
                <input id="itemTarefa" type="text" placeholder="Nova tarefa..." class="flex-1 p-3 border rounded-xl bg-slate-50 focus:ring-2 focus:ring-emerald-500 outline-none transition-all">
                <button onclick="adicionarItem('tarefas', 'itemTarefa')" class="bg-emerald-600 text-white px-5 py-2 rounded-xl hover:bg-emerald-700 active:scale-95 transition-all font-bold text-xl">+</button>
            </div>
            <ul id="listaTarefas" class="divide-y divide-slate-100"></ul>
        </section>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // --- SUBSTITUA PELAS SUAS CONFIGURAÇÕES DO FIREBASE ---
        const firebaseConfig = {
            apiKey: "A_TUA_API_KEY",
            authDomain: "O_TEU_PROJETO.firebaseapp.com",
            projectId: "O_TEU_PROJETO",
            storageBucket: "O_TEU_PROJETO.appspot.com",
            messagingSenderId: "TEU_SENDER_ID",
            appId: "TEU_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Função Global para Adicionar
        window.adicionarItem = async (colecao, inputId) => {
            const input = document.getElementById(inputId);
            const texto = input.value.trim();
            if (texto !== "") {
                await addDoc(collection(db, colecao), {
                    texto: texto,
                    criadoEm: Date.now()
                });
                input.value = "";
            }
        };

        // Função Global para Eliminar
        window.eliminarItem = async (colecao, id) => {
            await deleteDoc(doc(db, colecao, id));
        };

        // Renderizar Compras
        onSnapshot(query(collection(db, "compras"), orderBy("criadoEm", "desc")), (snapshot) => {
            const lista = document.getElementById('listaCompras');
            lista.innerHTML = "";
            snapshot.forEach(docSnap => {
                const item = docSnap.data();
                lista.innerHTML += `
                    <li class="py-3 flex justify-between items-center list-enter">
                        <span class="text-slate-700 font-medium">${item.texto}</span>
                        <button onclick="eliminarItem('compras', '${docSnap.id}')" class="text-slate-300 hover:text-red-500 p-1">✕</button>
                    </li>`;
            });
        });

        // Renderizar Tarefas
        onSnapshot(query(collection(db, "tarefas"), orderBy("criadoEm", "desc")), (snapshot) => {
            const lista = document.getElementById('listaTarefas');
            lista.innerHTML = "";
            snapshot.forEach(docSnap => {
                const item = docSnap.data();
                lista.innerHTML += `
                    <li class="py-3 flex justify-between items-center list-enter">
                        <span class="text-slate-700 font-medium">${item.texto}</span>
                        <button onclick="eliminarItem('tarefas', '${docSnap.id}')" class="text-slate-300 hover:text-red-500 p-1">✕</button>
                    </li>`;
            });
        });

        // Register Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
